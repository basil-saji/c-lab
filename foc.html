<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; color: #333; }
        h2 { margin-bottom: 5px; font-size: 24px; }
        p { margin-top: 0; color: #666; font-size: 14px; }
        hr { border: 0; border-top: 2px solid #333; margin-bottom: 20px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row > * { flex: 1; }

        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }

        /* Gender Radio Styles */
        .radio-container { display: flex; gap: 20px; align-items: center; height: 38px; }
        .radio-container div { display: flex; align-items: center; gap: 5px; }
        .radio-container label { font-weight: normal; margin-bottom: 0; cursor: pointer; }

        /* Button Styles to match image */
        .button-container { display: flex; gap: 10px; margin-top: 20px; }
        
        .btn-clear {
            background-color: white; color: black; border: 1px solid black;
            padding: 10px 20px; cursor: pointer; font-size: 14px; border-radius: 2px;
        }

        .btn-submit {
            background-color: #333; color: white; border: none;
            padding: 10px 20px; cursor: pointer; font-size: 14px; border-radius: 2px;
        }

        .btn-submit:hover { background-color: #000; }
        .btn-clear:hover { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h2>Student Registration Form</h2>
    <p>Fill out the form for registration</p>
    <hr>

    <form action="#" method="post">
        
        <div class="form-group">
            <label>Name</label>
            <div class="row">
                <input type="text" placeholder="First" name="firstName">
                <input type="text" placeholder="Last" name="lastName">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date" name="birthDate">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <div class="radio-container">
                    <div>
                        <input type="radio" id="male" name="gender" value="male">
                        <label for="male">Male</label>
                    </div>
                    <div>
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" placeholder="Address line 1" name="addr1" style="margin-bottom: 10px;">
            <input type="text" placeholder="Address line 2" name="addr2" style="margin-bottom: 10px;">
            <div class="row">
                <input type="text" placeholder="City" name="city">
                <input type="text" placeholder="Region" name="region">
            </div>
            <div class="row">
                <input type="text" placeholder="Postal / Zip Code" name="zip">
                <select name="country">
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="john.doe@example.com" name="email">
        </div>

        <div class="row">
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" placeholder="081234 56789" name="phone">
            </div>
            <div class="form-group">
                <label>Work Phone</label>
                <input type="tel" placeholder="081234 56789" name="workPhone">
            </div>
        </div>

        <div class="form-group">
            <label>Company</label>
            <input type="text" placeholder="ACME LTD" name="company">
        </div>

        <div class="form-group">
            <label>Courses</label>
            <select name="courses">
                <option value="">Please Select</option>
                <option value="dev">Web Development</option>
                <option value="design">UI/UX Design</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comments</label>
            <textarea rows="4" name="comments"></textarea>
        </div>

        <div class="button-container">
            <button type="reset" class="btn-clear">Clear Fields</button>
            <button type="submit" class="btn-submit">Submit Application</button>
        </div>

    </form>

</body>
</html>

            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" rows="4"></textarea>
        </div>

        <div class="buttons">
            <button type="reset">Clear Fields</button>
            <button type="submit" style="background: #333; color: white; padding: 10px 20px; border: none; cursor: pointer;">
                Submit Application
            </button>
        </div>

    </form>

</body>
  </html>
