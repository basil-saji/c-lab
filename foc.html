<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="date"], select, textarea {
            width: 100%; padding: 8px; box-sizing: border-box;
        }
        .radio-group { display: flex; gap: 15px; align-items: center; }
        .radio-group label { font-weight: normal; margin: 0; }
        .buttons { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Student Registration Form</h2>
    <p>Fill out the form for registration</p>
    <hr>

    <form action="#" method="post">
        
        <div class="form-group">
            <label>Name</label>
            <div class="row">
                <input type="text" placeholder="First" name="firstName" required>
                <input type="text" placeholder="Last" name="lastName" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group" style="flex: 1;">
                <label for="birthdate">Birth Date</label>
                <input type="date" id="birthdate" name="birthdate">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Gender</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" placeholder="Address line 1" name="addr1" style="margin-bottom: 5px;">
            <input type="text" placeholder="Address line 2" name="addr2" style="margin-bottom: 5px;">
            <div class="row" style="margin-bottom: 5px;">
                <input type="text" placeholder="City" name="city">
                <input type="text" placeholder="Region" name="region">
            </div>
            <div class="row">
                <input type="text" placeholder="Postal / Zip Code" name="zip">
                <select name="country">
                    <option value="India">India</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="john.doe@example.com">
        </div>

        <div class="row">
            <div class="form-group" style="flex: 1;">
                <label>Phone</label>
                <input type="tel" name="phone" placeholder="081234 56789">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Work Phone</label>
                <input type="tel" name="workphone" placeholder="081234 56789">
            </div>
        </div>

        <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" name="company" placeholder="ACME LTD">
        </div>

        <div class="form-group">
            <label for="courses">Courses</label>
            <select id="courses" name="courses">
                <option value="">Please Select</option>
                <option value="cs">Computer Science</option>
                <option value="math">Mathematics</option>
                <option value="arts">Fine Arts</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" rows="4"></textarea>
        </div>

        <div class="buttons">
            <button type="reset">Clear Fields</button>
            <button type="submit" style="background: #333; color: white; padding: 10px 20px; border: none; cursor: pointer;">
                Submit Application
            </button>
        </div>

    </form>

</body>
  </html>
